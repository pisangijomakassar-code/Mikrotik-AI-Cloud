name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 30m
          script: |
            set -e

            APP_DIR=/opt/mikrotik-ai-agent

            # Ensure swap exists (prevents OOM during builds on low-RAM VPS)
            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo '/swapfile none swap sw 0 0' >> /etc/fstab
              echo "Swap 2GB created"
            fi
            swapon --show || true

            # Clone or pull
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
            elif [ -d "$APP_DIR" ]; then
              cd $APP_DIR
              git init
              git remote add origin "https://${GH_TOKEN}@github.com/codevjs/mikrotik-ai-agent.git"
              git fetch origin
              git checkout -f origin/main -B main
            else
              git clone "https://${GH_TOKEN}@github.com/codevjs/mikrotik-ai-agent.git" $APP_DIR
              cd $APP_DIR
            fi

            # Create .env if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from template - edit with real credentials"
            fi

            mkdir -p data

            # Stop ALL containers before building (free up RAM for build)
            docker compose down --remove-orphans || true
            docker rm -f mikrotik-db mikrotik-dashboard mikrotik-agent 2>/dev/null || true

            # Build images one at a time to limit RAM usage
            echo "Building mikrotik-agent..."
            docker compose build mikrotik-agent

            echo "Building dashboard..."
            DOCKER_BUILDKIT=1 docker compose build --build-arg NODE_OPTIONS="--max-old-space-size=512" dashboard

            # Prune old images to free disk
            docker image prune -f || true

            # Start services in order
            echo "Starting postgres..."
            docker compose up -d postgres
            sleep 10

            echo "Starting dashboard..."
            docker compose up -d dashboard
            sleep 5

            echo "Starting mikrotik-agent..."
            docker compose up -d mikrotik-agent

            # Run database migrations
            echo "Running migrations..."
            docker compose exec -T dashboard npx prisma migrate deploy 2>/dev/null || echo "Migration skipped (first run needs manual setup)"

            # Seed admin user (upsert — safe to re-run, reads ADMIN_EMAIL + ADMIN_PASSWORD from .env)
            echo "Seeding admin user..."
            docker compose exec -T dashboard npx prisma db seed 2>/dev/null || echo "Seed skipped"

            echo "---"
            docker compose ps
            echo "---"
            echo "Deploy complete"
