name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e

            APP_DIR=/opt/mikrotik-ai-agent

            # Clone or pull
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git pull origin main
            else
              git clone "https://${GH_TOKEN}@github.com/codevjs/mikrotik-ai-agent.git" $APP_DIR
              cd $APP_DIR
            fi

            # Create .env if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from template - edit with real credentials"
              echo "   nano $APP_DIR/.env"
            fi

            # Create data dir
            mkdir -p data

            # Build and deploy
            docker compose down || true
            docker compose up -d --build

            # Show status
            echo "---"
            docker compose ps
            echo "---"
            echo "Deploy complete"
