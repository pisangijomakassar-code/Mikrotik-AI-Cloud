name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 45m
          script: |
            set -e
            APP_DIR=/opt/mikrotik-ai-agent

            # Clone or pull latest code
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
            elif [ -d "$APP_DIR" ]; then
              cd $APP_DIR
              git init
              git remote add origin "https://${GH_TOKEN}@github.com/codevjs/mikrotik-ai-agent.git"
              git fetch origin
              git checkout -f origin/main -B main
            else
              git clone "https://${GH_TOKEN}@github.com/codevjs/mikrotik-ai-agent.git" $APP_DIR
              cd $APP_DIR
            fi

            cd $APP_DIR
            mkdir -p data

            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from template - edit with real credentials"
            fi

            # Stop ALL containers before building (free up RAM for build)
            docker compose down --remove-orphans || true

            # Build images one at a time
            echo "Building mikrotik-agent..."
            docker compose build mikrotik-agent

            echo "Building dashboard..."
            DOCKER_BUILDKIT=1 docker compose build dashboard

            # Prune old images to free disk
            docker image prune -f || true

            # Start services in order
            echo "Starting postgres..."
            docker compose up -d postgres
            sleep 10

            echo "Starting dashboard..."
            docker compose up -d dashboard
            sleep 5

            echo "Starting mikrotik-agent..."
            docker compose up -d mikrotik-agent

            # Sync schema (creates missing tables) then apply delta migrations
            echo "Syncing database schema..."
            docker compose exec -T dashboard npx prisma db push --accept-data-loss --skip-generate 2>/dev/null || echo "DB push skipped"
            docker compose exec -T dashboard npx prisma migrate deploy 2>/dev/null || echo "Migration skipped"

            # Seed admin user
            echo "Seeding admin user..."
            docker compose exec -T dashboard npx prisma db seed 2>/dev/null || echo "Seed skipped"

            echo "---"
            docker compose ps
            echo "---"
            echo "Deploy complete"
