services:
  postgres:
    image: postgres:16-alpine
    container_name: mikrotik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikrotik
      POSTGRES_USER: mikrotik
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=2MB
        -c maintenance_work_mem=16MB
        -c effective_cache_size=64MB
        -c max_connections=20
        -c log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrotik"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    container_name: mikrotik-dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
      NEXTAUTH_URL: http://${VPS_HOST:-localhost}:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mikrotik.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./config:/app/config
      - ./docs:/app/docs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  mikrotik-agent:
    container_name: mikrotik-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
    volumes:
      - nanobot-data:/root/.nanobot
      - ./skills:/app/skills:ro
      - ./mikrotik_mcp:/app/mikrotik_mcp:ro
      - ./data:/app/data
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock  # For SoftEther VPN user management via docker exec
    networks:
      - internal
      - vpn
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  sstp-vpn:
    image: siomiz/softethervpn
    container_name: mikrotik-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "443:443"    # SSTP
    environment:
      SPW: ${SSTP_ADMIN_PASSWORD}    # Server password
      HPW: ${SSTP_ADMIN_PASSWORD}    # Hub password
    volumes:
      - vpn-data:/usr/vpnserver
    networks:
      - internal
      - vpn
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  nanobot-data:
  pgdata:
  vpn-data:

networks:
  internal:
    driver: bridge
  vpn:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
