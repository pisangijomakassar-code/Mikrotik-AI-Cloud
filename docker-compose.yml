services:
  postgres:
    image: postgres:16-alpine
    container_name: mikrotik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mikrotik
      POSTGRES_USER: mikrotik
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=2MB
        -c maintenance_work_mem=16MB
        -c effective_cache_size=64MB
        -c max_connections=20
        -c log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrotik"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    container_name: mikrotik-dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
      NEXTAUTH_URL: http://${VPS_HOST:-localhost}:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mikrotik.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./config:/app/config
    ports:
      - "3000:3000"
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  mikrotik-agent:
    container_name: mikrotik-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
    volumes:
      - nanobot-data:/root/.nanobot
      - ./skills:/app/skills:ro
      - ./mikrotik_mcp:/app/mikrotik_mcp:ro
      - ./data:/app/data
      - ./config:/app/config:ro
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  nanobot-data:
  pgdata:

networks:
  internal:
    driver: bridge
