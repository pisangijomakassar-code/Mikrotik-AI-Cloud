services:
  postgres:
    image: postgres:16-alpine
    container_name: mikrotik-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: mikrotik
      POSTGRES_USER: mikrotik
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=2MB
        -c maintenance_work_mem=16MB
        -c effective_cache_size=64MB
        -c max_connections=20
        -c log_min_messages=warning
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrotik"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    container_name: mikrotik-dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
      AUTH_URL: http://${VPS_HOST:-localhost}:3000
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      WG_SERVER_PUBKEY: ${WG_SERVER_PUBKEY:-}
      OVPN_SERVER_HOST: ${VPS_HOST:-localhost}
      AGENT_HEALTH_URL: http://mikrotik-agent:8080
      AGENT_TOKEN: ${AGENT_TOKEN:-}
    volumes:
      - ./config:/app/config
      - ./docs:/app/docs:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  mikrotik-agent:
    container_name: mikrotik-agent
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mikrotik:${DB_PASSWORD}@postgres:5432/mikrotik
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_TUNNEL_DOMAIN: ${CLOUDFLARE_TUNNEL_DOMAIN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      SSTP_SERVER_HOST: ${SSTP_SERVER_HOST}
      SSTP_VPN_SUBNET: ${SSTP_VPN_SUBNET}
      SSTP_ADMIN_PASSWORD: ${SSTP_ADMIN_PASSWORD}
      WG_SERVER_PUBKEY: ${WG_SERVER_PUBKEY:-}
      OVPN_SERVER_HOST: ${VPS_HOST:-localhost}
      AGENT_TOKEN: ${AGENT_TOKEN:-}
    volumes:
      - nanobot-data:/root/.nanobot
      - ./skills:/app/skills:ro
      - ./mikrotik_mcp:/app/mikrotik_mcp:ro
      - ./data:/app/data
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock  # For SoftEther VPN user management via docker exec
    networks:
      - internal
      - vpn
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  sstp-vpn:
    image: siomiz/softethervpn
    container_name: mikrotik-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    env_file: .env
    environment:
      SPW: ${SSTP_ADMIN_PASSWORD}
      HPW: ${SSTP_ADMIN_PASSWORD}
    volumes:
      - vpn-data:/usr/vpnserver
    networks:
      - internal
      - vpn
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: mikrotik-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Jakarta
      SERVERURL: ${VPS_HOST:-localhost}
      SERVERPORT: 51820
      INTERNAL_SUBNET: 10.8.0.0/16
      ALLOWEDIPS: 0.0.0.0/0
      LOG_CONFS: "false"
    volumes:
      - wg-data:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    networks:
      - internal
      - vpn
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  openvpn:
    build:
      context: ./docker/openvpn
      dockerfile: Dockerfile
    container_name: mikrotik-openvpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - ovpn-data:/config
    ports:
      - "1194:1194/tcp"
      # Winbox port pool: 18291-18500 (~210 routers). API port pool: 18728-18937.
      - "18291-18500:18291-18500/tcp"
      - "18728-18937:18728-18937/tcp"
    networks:
      - internal
      - vpn
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

volumes:
  nanobot-data:
  pgdata:
  vpn-data:
  wg-data:
  ovpn-data:

networks:
  internal:
    driver: bridge
  vpn:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
