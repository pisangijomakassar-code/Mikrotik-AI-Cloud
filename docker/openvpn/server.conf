port 1194
proto tcp-server
dev tun

ca   /config/pki/ca.crt
cert /config/pki/server.crt
key  /config/pki/server.key
dh   /config/pki/dh.pem

topology subnet
server 10.9.0.0 255.255.0.0

ifconfig-pool-persist /config/ipp.txt
client-config-dir /config/ccd

# Username/password auth — no client cert needed
auth-user-pass-verify /etc/openvpn/auth-check.sh via-file
script-security 3
username-as-common-name
verify-client-cert none

# RouterOS 6 compatibility — force CBC only, disable NCP (OpenVPN 2.5+ defaults to GCM)
cipher AES-256-CBC
data-ciphers AES-256-CBC
auth SHA1

push "route 10.9.0.0 255.255.0.0"
keepalive 10 120
persist-key
persist-tun

status /config/openvpn-status.log 10
log-append /config/openvpn.log
verb 3
