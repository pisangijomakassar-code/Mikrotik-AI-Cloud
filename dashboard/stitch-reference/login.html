<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | MikroTik AI Agent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#2d3449",
                        "primary-fixed": "#acedff",
                        "on-primary-fixed": "#001f26",
                        "primary-container": "#06b6d4",
                        "surface-container": "#171f33",
                        "surface-tint": "#4cd7f6",
                        "surface-container-low": "#131b2e",
                        "on-primary": "#003640",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-tertiary-fixed": "#002109",
                        "on-primary-container": "#00424f",
                        "tertiary": "#4ae176",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#14bf59",
                        "primary-fixed-dim": "#4cd7f6",
                        "on-error": "#690005",
                        "outline-variant": "#3d494c",
                        "on-secondary": "#233144",
                        "on-tertiary-container": "#00461b",
                        "on-primary-fixed-variant": "#004e5c",
                        "surface-container-lowest": "#060e20",
                        "surface-bright": "#31394d",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-dim": "#0b1326",
                        "inverse-on-surface": "#283044",
                        "outline": "#869397",
                        "tertiary-fixed": "#6bff8f",
                        "secondary-container": "#3c4a5e",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface": "#dae2fd",
                        "secondary": "#b9c7e0",
                        "secondary-fixed-dim": "#b9c7e0",
                        "inverse-primary": "#00687a",
                        "surface-container-high": "#222a3d",
                        "surface-container-highest": "#2d3449",
                        "on-secondary-fixed": "#0d1c2f",
                        "on-secondary-container": "#abb9d2",
                        "on-surface-variant": "#bcc9cd",
                        "background": "#0b1326",
                        "primary": "#4cd7f6",
                        "error": "#ffb4ab",
                        "on-tertiary": "#003915",
                        "on-background": "#dae2fd",
                        "on-tertiary-fixed-variant": "#005321"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0b1326;
        }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: rgba(45, 52, 73, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .mesh-gradient {
            background-color: #0b1326;
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(74, 225, 118, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(11, 19, 38, 1) 0px, transparent 100%);
        }
    </style>
</head>
<body class="mesh-gradient min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[128px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-tertiary/5 rounded-full blur-[96px]"></div>
</div>
<!-- Login Container -->
<main class="relative w-full max-w-[440px] z-10">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-10">
<div class="relative mb-6">
<!-- Node Pulse Effect -->
<div class="absolute inset-0 scale-150 opacity-20 bg-primary rounded-full blur-xl"></div>
<div class="relative w-20 h-20 bg-surface-container-highest rounded-full flex items-center justify-center border border-white/10 shadow-2xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="router">router</span>
<div class="absolute -top-1 -right-1 bg-surface-container-highest p-1.5 rounded-full border border-tertiary/30 shadow-[0_0_15px_rgba(74,225,118,0.3)]">
<span class="material-symbols-outlined text-tertiary text-xl" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-2">MikroTik AI Agent</h1>
<p class="text-on-surface-variant font-medium tracking-wide">Manage your routers with AI</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-full p-8 shadow-2xl border border-white/5">
<form class="space-y-6">
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary/70 ml-1" for="email">Network Identity</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-highest/50 border border-transparent focus:border-primary/50 focus:ring-4 focus:ring-primary/10 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all font-mono text-sm" id="email" placeholder="administrator@network.local" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-widest text-primary/70" for="password">Access Key</label>
<a class="text-[10px] uppercase font-bold text-tertiary hover:text-tertiary-fixed-dim transition-colors tracking-tighter" href="#">Request Recovery</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-highest/50 border border-transparent focus:border-primary/50 focus:ring-4 focus:ring-primary/10 rounded-xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all font-mono text-sm" id="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full group relative overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</div>
</button>
<!-- Additional Options -->
<div class="flex items-center gap-4 py-2">
<div class="h-px flex-1 bg-white/5"></div>
<span class="text-[10px] font-bold text-outline/40 uppercase tracking-[0.2em]">Secure Session</span>
<div class="h-px flex-1 bg-white/5"></div>
</div>
<!-- Secondary Link -->
<p class="text-center text-sm text-on-surface-variant">
                    Need infrastructure access? 
                    <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4" href="#">Register Router</a>
</p>
</form>
</div>
<!-- AI Status Indicator Footer -->
<div class="mt-8 flex items-center justify-center gap-4 text-[10px] font-bold uppercase tracking-widest text-outline/60">
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 bg-tertiary rounded-full animate-pulse shadow-[0_0_8px_rgba(74,225,118,0.8)]"></span>
<span>AI Core Online</span>
</div>
<div class="w-1 h-1 bg-white/10 rounded-full"></div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-xs" data-icon="verified_user">verified_user</span>
<span>v2.4.0 Encrypted</span>
</div>
</div>
</main>
<!-- Illustrative Detail -->
<div class="fixed bottom-0 right-0 p-12 opacity-10 hidden xl:block">
<span class="material-symbols-outlined text-[320px] text-primary" data-icon="hub">hub</span>
</div>
</body></html>
